<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChordFlipper</title>
    <meta name="description" content="Random guitar chord trainer with built-in metronome">
    <meta name="theme-color" content="#2a4949">

    <link rel="stylesheet" href="style.css?v=3">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" href="/icon/icon-192x192.png?v=3">
    <link rel="apple-touch-icon" href="/icon/icon-192x192.png?v=3">
</head>
<body>
    <main class="app">
        <header class="app-header">
            <img src="images/ChordFlipper100.jpeg" alt="ChordFlipper Logo" id="logo">
            <h1>ChordFlipper</h1>
        </header>

        <section class="practice-screen">
            <div id="chordDisplay" class="chord-display">C</div>
            <div id="countdownDisplay" class="countdown-display hidden">3</div>
        </section>

        <div id="beatIndicator" class="beat-indicator hidden"></div>

        <section id="settingsPanel" class="settings-panel">
            <label for="chordsInput">Akkoorden</label>
            <input type="text" id="chordsInput" value="C, G, Am, F">
            <div class="favorite-sets">
    <label for="favoriteSetSelect">Opgeslagen akkoordensets</label>

    <div class="favorite-set-row">
        <select id="favoriteSetSelect">
            <option value="">Kies een akkoordenset</option>
        </select>
    </div>

    <div class="favorite-set-row">
        <input
            id="favoriteSetName"
            type="text"
            placeholder="Naam, bijvoorbeeld Blues in A"
            maxlength="40"
        >

        <button id="saveFavoriteSetButton" type="button">
            Opslaan
        </button>
    </div>

    <button
        id="deleteFavoriteSetButton"
        type="button"
        disabled
    >
        Verwijderen
    </button>
</div>

            <label for="intervalSelector">Interval</label>
            <select id="intervalSelector">
                <option value="4">4 beats</option>
                <option value="8">8 beats</option>
                <option value="12">12 beats</option>
                <option value="16" selected>16 beats</option>
            </select>

            <div class="tempo-section">
                <span>Tempo</span>
                <div id="tempo" class="tempo-display">60</div>
                <div class="tempo-controls">
                    <button class="tempo-change" type="button" data-change="-5">-5</button>
                    <button class="tempo-change" type="button" data-change="-1">-</button>
                    <button class="tempo-change" type="button" data-change="1">+</button>
                    <button class="tempo-change" type="button" data-change="5">+5</button>
                </div>
            </div>
        </section>

        <section class="main-controls">
            <button id="startButton" type="button">Start</button>
            <button id="pauseButton" type="button" class="hidden">Pauze</button>
        </section>

        <footer class="footer-links">
            Version 2.1 ·
            <a href="https://pages.cloudflare.com/" target="_blank">Hosted on Cloudflare Pages</a>
            ·
            <a href="https://github.com/MartinZwolle/chordflipper" target="_blank">Source code on GitHub</a>
        </footer>
    </main>

    <script src="js/metronome.js?v=4"></script>
    <script src="js/state.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/practice.js?v=4"></script>
    <script src="js/storage.js"></script>
    <script src="js/app.js?v=3"></script>
</body>
</html>
